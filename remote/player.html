<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>D&D Player View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: black; overflow: hidden; }

    #scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    #scene.fading { opacity: 0; }

    #scene img {
      width: 100%;
      height: 100%;
    }
    #scene video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #scene .text-content {
      font-family: serif;
      font-size: 2rem;
      color: white;
      text-align: center;
      padding: 2rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #cutscene {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: black;
      display: none;
    }
    #cutscene.active { display: block; }
    #cutscene video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #tap-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    #tap-overlay.hidden { display: none; }
    #tap-overlay .tap-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #555;
    }
    #tap-overlay .tap-text {
      font-family: serif;
      font-size: 1.2rem;
      color: #444;
      letter-spacing: 0.15em;
    }

    #status {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 11px;
      color: #333;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="scene"></div>
  <div id="cutscene">
    <video id="cutscene-video" playsinline></video>
  </div>
  <div id="tap-overlay">
    <div class="tap-icon">⚔</div>
    <div class="tap-text">tap to enter</div>
  </div>
  <div id="status">connecting...</div>

  <script src="/remote/player.js"></script>
</body>
</html>
