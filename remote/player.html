<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>D&D Player View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: black; overflow: hidden; }

    #scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    #scene.fading { opacity: 0; }

    #scene img {
      width: 100%;
      height: 100%;
    }
    #scene video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #scene .text-content {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: #f0e6c8;
      text-align: center;
      padding: 3rem 4rem;
      white-space: pre-wrap;
      line-height: 1.8;
      text-shadow: 1px 2px 6px rgba(0,0,0,1);
      max-width: 900px;
      width: 100%;
    }
    #scene .text-title {
      font-family: 'Georgia', serif;
      font-size: 2.8rem;
      font-weight: bold;
      color: #d4af37;
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-shadow: 1px 2px 8px rgba(0,0,0,1);
    }

    #cutscene {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: black;
      display: none;
    }
    #cutscene.active { display: block; }
    #cutscene video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #tap-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    #tap-overlay.hidden { display: none; }
    #tap-overlay .tap-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    #tap-overlay .tap-text {
      font-family: 'Georgia', serif;
      font-size: 1.6rem;
      color: #d4af37;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #status {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 11px;
      color: #333;
      font-family: monospace;
    }
    #unlock-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(212,175,55,0.15);
      color: #888;
      font-family: monospace;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      cursor: pointer;
      z-index: 500;
      transition: background 0.3s;
    }
    #unlock-bar:hover { background: rgba(212,175,55,0.25); }

    #popup-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 300;
      /* Size to show the full parchment image (1200×1000, 6:5 ratio).
         Take the largest square that fits 90% of the shorter viewport side,
         then apply the 6:5 ratio. */
      width: min(54vw, 54vh * 1.2);
      max-height: 82vh;
      background-image: url('/assets/maps/Parchment.png');
      background-size: 100% 100%;   /* stretch to fill box exactly — no cropping */
      border: none;
      border-radius: 0;
      padding: 8% 10%;              /* proportional so text stays inside the scroll edging */
      overflow-y: hidden;
      box-sizing: border-box;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      color: #2a1a00;
      font-family: 'Georgia', 'Palatino Linotype', serif;
      text-shadow: 0 1px 2px rgba(255,255,255,0.3);
      text-align: center;
    }
    #popup-overlay.visible { opacity: 1; }
    /* All text inside forced dark and readable on the light parchment */
    #popup-overlay * { color: #2a1a00 !important; text-shadow: 0 1px 1px rgba(255,255,255,0.2) !important; }
    #popup-overlay h1, #popup-overlay h2, #popup-overlay h3 {
      font-family: 'Georgia', serif;
      border-bottom: 1px solid rgba(90,50,10,0.4);
      padding-bottom: 0.4rem;
      margin-bottom: 0.75rem;
    }

    #fullscreen-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 400;
      background: rgba(10,10,20,0.7);
      border: 1px solid #d4af37;
      border-radius: 6px;
      color: #d4af37;
      font-size: 1.2rem;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #fullscreen-btn.hidden { opacity: 0; pointer-events: none; }
    #fullscreen-btn:hover { background: rgba(212,175,55,0.2); }

    /* ── 3D Dice Roll Overlay ── */
    #dice-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0);
      pointer-events: none;
    }
    #dice-overlay.visible, #dice-overlay.hiding { display: flex; }
    #dice-overlay.visible { animation: dice-bg-in  0.4s ease forwards; }
    #dice-overlay.hiding  { animation: dice-bg-out 0.6s ease forwards; }
    @keyframes dice-bg-in  { to   { background: rgba(0,0,0,0.88); } }
    @keyframes dice-bg-out { from { background: rgba(0,0,0,0.88); } }
    #dice-scene {
      perspective: 900px;
      perspective-origin: 50% 40%;
    }
    #dice-wrapper {
      transform-style: preserve-3d;
    }
    #dice-wrapper.settling {
      animation: dice-bounce 0.55s cubic-bezier(0.2, 1.5, 0.4, 1) both;
    }
    @keyframes dice-bounce {
      0%   { transform: scale(1.35); }
      45%  { transform: scale(0.88); }
      72%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    #dice-3d {
      width: 160px;
      height: 160px;
      position: relative;
      transform-style: preserve-3d;
    }
    #dice-3d.rolling {
      animation: dice-tumble 1.9s cubic-bezier(0.1, 0.3, 0.22, 1) both;
    }
    @keyframes dice-tumble {
      0%   { transform: rotateX(0deg)    rotateY(0deg)    rotateZ(0deg); }
      22%  { transform: rotateX(450deg)  rotateY(260deg)  rotateZ(80deg); }
      48%  { transform: rotateX(810deg)  rotateY(590deg)  rotateZ(175deg); }
      70%  { transform: rotateX(990deg)  rotateY(900deg)  rotateZ(268deg); }
      84%  { transform: rotateX(1048deg) rotateY(1018deg) rotateZ(335deg); }
      93%  { transform: rotateX(1070deg) rotateY(1066deg) rotateZ(354deg); }
      100% { transform: rotateX(1080deg) rotateY(1080deg) rotateZ(360deg); }
    }
    .dice-face {
      position: absolute;
      width: 160px;
      height: 160px;
      background: linear-gradient(145deg, #1c1c30, #10101c);
      border: 2.5px solid #4a3818;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Palatino Linotype', serif;
      font-size: 4.5rem;
      font-weight: bold;
      color: #7a6025;
      backface-visibility: hidden;
      box-shadow: inset 0 0 28px rgba(0,0,0,0.7);
      user-select: none;
    }
    .dice-face.front  { transform: translateZ(80px); }
    .dice-face.back   { transform: translateZ(-80px) rotateY(180deg); }
    .dice-face.right  { transform: translateX(80px) rotateY(90deg); }
    .dice-face.left   { transform: translateX(-80px) rotateY(-90deg); }
    .dice-face.top    { transform: translateY(-80px) rotateX(90deg); }
    .dice-face.bot    { transform: translateY(80px) rotateX(-90deg); }
    .dice-face.front.settled {
      color: #d4af37;
      border-color: #d4af37;
      box-shadow: inset 0 0 28px rgba(0,0,0,0.7),
                  0 0 55px rgba(212,175,55,0.95),
                  0 0 110px rgba(212,175,55,0.45);
      transition: color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #dice-result-label {
      margin-top: 3.2rem;
      font-family: Georgia, serif;
      font-size: 3.2vmin;
      color: #d4af37;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(212,175,55,0.65);
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
    }
    #dice-result-label.visible { opacity: 1; }

    /* ── Die shapes via clip-path on faces (keeps 3D depth while faces are polygon-shaped) ── */
    #dice-3d[data-die]       .dice-face { border-radius: 0; }
    #dice-3d[data-die="4"]   .dice-face { clip-path: polygon(50% 4%, 96% 93%, 4% 93%); }
    #dice-3d[data-die="8"]   .dice-face { clip-path: polygon(50% 4%, 96% 50%, 50% 96%, 4% 50%); }
    #dice-3d[data-die="10"]  .dice-face { clip-path: polygon(50% 4%, 96% 42%, 78% 96%, 22% 96%, 4% 42%); }
    #dice-3d[data-die="12"]  .dice-face { clip-path: polygon(50% 4%, 93% 28%, 81% 95%, 19% 95%, 7% 28%); }
    #dice-3d[data-die="20"]  .dice-face { clip-path: polygon(50% 4%, 88% 21%, 97% 62%, 73% 97%, 27% 97%, 3% 62%, 12% 21%); }
    #dice-3d[data-die="100"] .dice-face { clip-path: circle(48% at 50% 50%); }

    /* ── Map Feature Animations ──────────────────────────────── */
    @keyframes feat-shake {
      0%  { transform: translate(0, 0); }
      10% { transform: translate(-6px, -4px); }
      20% { transform: translate(6px, 4px); }
      30% { transform: translate(-5px, 2px); }
      40% { transform: translate(5px, -3px); }
      50% { transform: translate(-4px, 4px); }
      60% { transform: translate(4px, -2px); }
      70% { transform: translate(-3px, 3px); }
      80% { transform: translate(3px, -1px); }
      90% { transform: translate(-2px, 2px); }
      100%{ transform: translate(0, 0); }
    }
    #scene.feat-shake { animation: feat-shake 0.55s ease; }

    @keyframes feat-flash {
      0%   { opacity: 1; }
      20%  { opacity: 0.2; }
      40%  { opacity: 1; }
      60%  { opacity: 0.2; }
      80%  { opacity: 1; }
      100% { opacity: 1; }
    }
    .feature-cell.feat-flash-anim { animation: feat-flash 0.7s ease forwards; }

    @keyframes feat-pulse {
      0%,100% { opacity: 0.6; }
      50%     { opacity: 1; }
    }
    .feature-cell.feat-pulse-anim { animation: feat-pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="tap-overlay">
    <div class="tap-icon">🎲</div>
    <div class="tap-text">tap to begin session</div>
  </div>
  <div id="scene"></div>
  <div id="popup-overlay"></div>
  <div id="dice-overlay">
    <div id="dice-scene">
      <div id="dice-wrapper">
        <div id="dice-3d">
          <div class="dice-face front"></div>
          <div class="dice-face back"></div>
          <div class="dice-face right"></div>
          <div class="dice-face left"></div>
          <div class="dice-face top"></div>
          <div class="dice-face bot"></div>
        </div>
      </div>
    </div>
    <div id="dice-result-label"></div>
  </div>
  <div id="blackout-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:#000;"></div>
  <div id="unlock-bar" style="display:none"></div>
  <div id="status">connecting...</div>
  <button id="fullscreen-btn" title="Toggle fullscreen">⛶</button>

  <script src="/remote/player.js"></script>
</body>
</html>
