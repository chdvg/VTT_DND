<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>D&D Player View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: black; overflow: hidden; }

    #scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    #scene.fading { opacity: 0; }

    #scene img {
      width: 100%;
      height: 100%;
    }
    #scene video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #scene .text-content {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: #f0e6c8;
      text-align: center;
      padding: 3rem 4rem;
      white-space: pre-wrap;
      line-height: 1.8;
      text-shadow: 1px 2px 6px rgba(0,0,0,1);
      max-width: 900px;
      width: 100%;
    }
    #scene .text-title {
      font-family: 'Georgia', serif;
      font-size: 2.8rem;
      font-weight: bold;
      color: #d4af37;
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-shadow: 1px 2px 8px rgba(0,0,0,1);
    }

    #cutscene {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: black;
      display: none;
    }
    #cutscene.active { display: block; }
    #cutscene video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #tap-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    #tap-overlay.hidden { display: none; }
    #tap-overlay .tap-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    #tap-overlay .tap-text {
      font-family: 'Georgia', serif;
      font-size: 1.6rem;
      color: #d4af37;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #status {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 11px;
      color: #333;
      font-family: monospace;
    }
    #unlock-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(212,175,55,0.15);
      color: #888;
      font-family: monospace;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      cursor: pointer;
      z-index: 500;
      transition: background 0.3s;
    }
    #unlock-bar:hover { background: rgba(212,175,55,0.25); }

    #popup-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 300;
      background-image: url('/assets/maps/Parchment.jpg');
      background-size: cover;
      background-position: center;
      border: 3px solid #7a5c2e;
      border-radius: 4px;
      padding: 2.5rem 3rem;
      min-width: 340px;
      max-width: 580px;
      max-height: 80vh;
      overflow-y: auto;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 0 60px rgba(0,0,0,0.15);
      color: #2a1a00;
      font-family: 'Georgia', 'Palatino Linotype', serif;
      text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    }
    #popup-overlay.visible { opacity: 1; }
    /* Make all text inside the parchment dark and readable */
    #popup-overlay * { color: #2a1a00 !important; text-shadow: 0 1px 1px rgba(255,255,255,0.2) !important; }
    #popup-overlay h1, #popup-overlay h2, #popup-overlay h3 {
      font-family: 'Georgia', serif;
      border-bottom: 1px solid rgba(90,50,10,0.4);
      padding-bottom: 0.4rem;
      margin-bottom: 0.75rem;
    }

    #fullscreen-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 400;
      background: rgba(10,10,20,0.7);
      border: 1px solid #d4af37;
      border-radius: 6px;
      color: #d4af37;
      font-size: 1.2rem;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #fullscreen-btn.hidden { opacity: 0; pointer-events: none; }
    #fullscreen-btn:hover { background: rgba(212,175,55,0.2); }
  </style>
</head>
<body>
  <div id="tap-overlay">
    <div class="tap-icon">🎲</div>
    <div class="tap-text">tap to begin session</div>
  </div>
  <div id="scene"></div>
  <div id="popup-overlay"></div>
  <div id="unlock-bar" style="display:none"></div>
  <div id="status">connecting...</div>
  <button id="fullscreen-btn" title="Toggle fullscreen">⛶</button>

  <script src="/remote/player.js"></script>
</body>
</html>
