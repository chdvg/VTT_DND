<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Builder — DM Console</title>
  <link rel="stylesheet" href="/map-builder/styles.css" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <a href="/" class="back-btn">← DM Panel</a>
    <h1>🗺️ Map Builder</h1>
  </div>
  <div class="header-center">
    <label>Grid <input type="number" id="grid-cols" value="20" min="4" max="60" /> × <input type="number" id="grid-rows" value="15" min="4" max="40" /></label>
    <label>Cell <input type="number" id="cell-size" value="40" min="16" max="96" />px</label>
    <button class="btn btn-secondary btn-small" id="apply-grid-btn">Apply</button>
  </div>
  <div class="header-right">
    <button class="btn btn-secondary btn-small" id="fog-toggle-btn" title="Toggle Fog of War painting mode">🌫 Fog</button>
    <button class="btn btn-secondary btn-small" id="fog-reveal-btn" title="Reveal all fog cells" style="display:none;">👁 Reveal All</button>
    <button class="btn btn-warning btn-small"   id="fog-hide-btn"   title="Hide all fog cells"   style="display:none;">🌑 Hide All</button>
    <button class="btn btn-secondary btn-small" id="undo-btn">↩ Undo</button>
    <button class="btn btn-warning btn-small"   id="clear-canvas-btn">🗑 Clear</button>
    <button class="btn btn-secondary btn-small" id="send-live-btn">📡 Send Live</button>
    <button class="btn btn-primary btn-small"   id="save-btn">💾 Save Map</button>
  </div>
</header>

<!-- ── Main layout ──────────────────────────────────────────── -->
<div class="workspace">

  <!-- Left sidebar: tools + palette -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-title">Tool</div>
      <div class="tool-group">
        <button class="tool-btn active" data-tool="paint"  title="Paint Tile">🖌 Paint</button>
        <button class="tool-btn"        data-tool="erase"  title="Erase Tile">⬜ Erase</button>
        <button class="tool-btn"        data-tool="fill"   title="Flood Fill">🪣 Fill</button>
        <button class="tool-btn"        data-tool="token"  title="Place Token">🪙 Token</button>
        <button class="tool-btn"        data-tool="label"  title="Add Label">🔤 Label</button>
        <button class="tool-btn"        data-tool="image"  title="Place BG Image">🖼 Image</button>
      </div>
    </div>

    <div class="sidebar-section" id="tile-palette-section">
      <div class="sidebar-title">Tile</div>
      <div class="tile-grid" id="tile-grid"></div>
    </div>

    <div class="sidebar-section" id="token-options" style="display:none;">
      <div class="sidebar-title">Token</div>
      <input type="text"  id="token-name"  placeholder="Name (e.g. Goblin)" />
      <select id="token-color">
        <option value="#ef4444">🔴 Enemy</option>
        <option value="#3b82f6">🔵 Player</option>
        <option value="#22c55e">🟢 Ally</option>
        <option value="#f59e0b">🟡 Object</option>
        <option value="#a855f7">🟣 Other</option>
      </select>
    </div>

    <div class="sidebar-section" id="label-options" style="display:none;">
      <div class="sidebar-title">Label</div>
      <input type="text" id="label-text" placeholder="Label text" />
      <select id="label-size">
        <option value="12">Small</option>
        <option value="16" selected>Medium</option>
        <option value="22">Large</option>
      </select>
      <select id="label-color">
        <option value="#ffffff">White</option>
        <option value="#d4af37">Gold</option>
        <option value="#f87171">Red</option>
        <option value="#86efac">Green</option>
      </select>
    </div>

    <div class="sidebar-section" id="image-options" style="display:none;">
      <div class="sidebar-title">Background Image</div>
      <p class="hint">Pick from your maps folder:</p>
      <div id="bg-image-list"></div>
      <p class="hint" style="margin-top:0.5rem;">Or enter URL:</p>
      <input type="text" id="bg-image-url" placeholder="/assets/maps/…" />
      <button class="btn btn-secondary btn-small" id="apply-bg-btn">Apply</button>
      <button class="btn btn-warning btn-small"   id="remove-bg-btn" style="margin-top:0.25rem;">Remove BG</button>
    </div>

  </aside>

  <!-- Canvas area -->
  <main class="canvas-area">
    <div id="canvas-scroll">
      <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="tile-canvas"></canvas>
        <div id="token-layer"></div>
        <div id="label-layer"></div>
        <canvas id="grid-canvas"></canvas>
        <canvas id="cursor-canvas"></canvas>
        <div id="fog-layer"></div>
      </div>
    </div>
    <div id="coords">0, 0</div>
  </main>

</div>

<!-- Save dialog -->
<div id="save-modal" class="modal hidden">
  <div class="modal-box">
    <h2>Save Map</h2>
    <label>Filename <input type="text" id="save-filename" placeholder="my_map.png" /></label>
    <label style="margin-top:0.5rem;">Add to scene list
      <input type="checkbox" id="save-add-scene" checked />
    </label>
    <div id="save-scene-opts">
      <input type="text" id="save-scene-area"  placeholder="Area (e.g. Phandalin)" />
      <input type="text" id="save-scene-label" placeholder="Scene label" />
      <label style="margin-top:0.4rem;font-size:0.875rem;display:flex;align-items:center;gap:0.4rem;">
        <input type="checkbox" id="save-fog" checked /> Enable Fog of War
      </label>
    </div>
    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn btn-primary"   id="save-confirm-btn">Save</button>
      <button class="btn btn-secondary" id="save-cancel-btn">Cancel</button>
    </div>
    <div id="save-status"></div>
  </div>
</div>

<script src="/map-builder/builder.js"></script>
</body>
</html>
