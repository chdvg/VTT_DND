<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Control Panel</title>
  <link rel="stylesheet" href="/dm/styles.css" />
</head>
<body>
  <header>
    <h1>🎲 DM Control Panel</h1>
    <div class="header-controls">
      <span id="client-count">0 connected</span>
      <span id="status-dot" class="status-dot off"></span>
    </div>
  </header>
  <div class="panel-grid">
    <section class="panel panel-full">
      <h2>Maps & Audio</h2>
      <div id="maps-audio-section" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
        <div>
          <h3 style="color:#aaa;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.75rem;">Available Maps</h3>
          <input type="text" id="map-search" placeholder="🔍 Search areas, scenes, maps…" style="margin-bottom:0.5rem;" />
          <div id="map-list"></div>
          <div id="fog-controls-container"></div>
        </div>
        <div>
          <h3 style="color:#aaa;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.75rem;">Available Audio</h3>
          <button id="stop-audio-btn" class="btn btn-danger btn-small" style="margin-bottom:0.5rem;">⏹ Stop All Audio</button>
          <input type="text" id="audio-search" placeholder="🔍 Search audio…" style="margin-bottom:0.5rem;" />
          <div id="audio-list"></div>
        </div>
      </div>
    </section>
    <section class="panel panel-full">
      <h2>Scene Builder</h2>
      <div id="scene-builder">
        <p style="color:#666;font-size:0.78rem;margin-bottom:0.75rem;">Hierarchy: <strong style="color:#d4af37">Area</strong> (e.g. Phandalin) &rsaquo; <strong style="color:#d4af37">Scene</strong> (e.g. Stonehill Inn) &rsaquo; <strong style="color:#d4af37">Map</strong> (e.g. Ground Floor)</p>
        <div class="scene-builder-row">
          <input type="text" id="sb-tab" placeholder="Area (e.g. Phandalin)" />
          <input type="text" id="sb-scene-label" placeholder="Scene (e.g. Stonehill Inn)" />
          <button class="btn btn-secondary btn-small" id="sb-new-scene-btn">+ New Scene</button>
        </div>
        <div id="sb-scene-list"></div>
      </div>
    </section>
    <section class="panel">
      <h2>Quick Actions</h2>
      <div class="btn-row">
        <button id="blackout-btn" class="btn btn-danger">⬛ BLACKOUT</button>
        <button id="clear-btn" class="btn btn-warning">🧹 CLEAR</button>
      </div>
    </section>
    <section class="panel">
      <h2>Send Text</h2>
      <input type="text" id="text-label" placeholder="Label (e.g. Room Description)" />
      <textarea id="text-content" rows="6" placeholder="Type content here..."></textarea>
      <div class="btn-row">
        <button id="send-text-btn" class="btn btn-primary">📜 Send Text</button>
      </div>
    </section>
    <section class="panel">
      <h2>Send Image</h2>
      <input type="text" id="image-label" placeholder="Label (e.g. Battle Map)" />
      <input type="text" id="image-url" placeholder="Image URL" />
      <div class="divider">— OR —</div>
      <input type="file" id="image-file" accept="image/*" />
      <div id="image-preview"></div>
      <div class="btn-row">
        <button id="send-image-btn" class="btn btn-primary">🗺️ Send Image</button>
      </div>
    </section>
    <section class="panel">
      <h2>Initiative Tracker</h2>
      <div id="init-list"></div>
      <div class="init-add">
        <input type="text" id="init-name" placeholder="Name" />
        <input type="number" id="init-roll" placeholder="Roll" min="1" max="30" />
        <button id="init-add-btn" class="btn btn-small btn-primary">+ Add</button>
      </div>
      <div class="btn-row">
        <button id="init-send-btn" class="btn btn-primary">⚔️ Send</button>
        <button id="init-next-btn" class="btn btn-secondary">⏭️ Next</button>
        <button id="init-clear-btn" class="btn btn-warning">Clear</button>
      </div>
    </section>
    <section class="panel">
      <h2>Dice Roller</h2>
      <div class="dice-buttons">
        <button class="btn-dice" data-die="4">d4</button>
        <button class="btn-dice" data-die="6">d6</button>
        <button class="btn-dice" data-die="8">d8</button>
        <button class="btn-dice" data-die="10">d10</button>
        <button class="btn-dice" data-die="12">d12</button>
        <button class="btn-dice" data-die="20">d20</button>
        <button class="btn-dice" data-die="100">d100</button>
      </div>
      <div id="dice-result"></div>
      <label><input type="checkbox" id="dice-broadcast" /> Broadcast to players</label>
    </section>
  </div>
  <script src="/dm/app.js"></script>
</body>
</html>
